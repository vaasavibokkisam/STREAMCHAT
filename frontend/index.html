<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamChat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface-2: #222228;
      --border: #2e2e38;
      --accent: #7c6ef7;
      --accent-dim: #3d3680;
      --text: #e8e8f0;
      --text-muted: #7a7a90;
      --user-bg: #1e1b3a;
      --ai-bg: #18181c;
      --error: #f87171;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 760px;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .token-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .token-count { color: var(--accent); font-weight: 500; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.ai   { align-items: flex-start; }

    .role-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .bubble {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--accent-dim);
      border-radius: 14px 14px 4px 14px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
    }

    /* typing indicator */
    .typing-dots {
      display: flex; gap: 5px; padding: 4px 0;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .error-bubble {
      background: #2a1515;
      border: 1px solid #6b2020;
      border-radius: 14px;
      padding: 10px 16px;
      color: var(--error);
      font-size: 0.88rem;
      max-width: 88%;
    }

    /* cursor blink during stream */
    .streaming::after {
      content: '▍';
      display: inline-block;
      color: var(--accent);
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ── */
    .input-area {
      width: 100%;
      max-width: 760px;
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.93rem;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      overflow-y: auto;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #sendBtn:hover { background: #9080ff; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { background: var(--surface-2); cursor: not-allowed; }

    #sendBtn svg { width: 16px; height: 16px; fill: white; }

    .hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
    }

    .empty-state h2 { font-size: 1.4rem; color: var(--text); font-weight: 600; }
    .empty-state p  { font-size: 0.9rem; max-width: 340px; line-height: 1.6; }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    StreamChat
  </div>
  <div class="token-badge">
    tokens&nbsp;<span class="token-count" id="tokenCount">0</span>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <h2>Start a conversation</h2>
    <p>Send a message below. Responses stream token by token in real time.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Type a message…"></textarea>
    <button id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  const BACKEND = "https://c04d-2401-4900-8839-6cd6-2dc5-483f-bb1f-169d.ngrok-free.app";

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const sendBtn    = document.getElementById("sendBtn");
  const tokenEl    = document.getElementById("tokenCount");
  const emptyState = document.getElementById("emptyState");

  let history = [];        // [{role, content}]
  let totalTokens = 0;
  let isStreaming = false;

  // ── Auto-resize textarea ──
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // ── Enter to send ──
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Helpers ──
  function appendMessage(role, content = "") {
    emptyState?.remove();

    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const label = document.createElement("div");
    label.className = "role-label";
    label.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    emptyState?.remove();
    const wrap = document.createElement("div");
    wrap.className = "message ai";
    wrap.id = "typingIndicator";

    const label = document.createElement("div");
    label.className = "role-label";
    label.textContent = "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";
    bubble.appendChild(dots);

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function showError(msg) {
    const wrap = document.createElement("div");
    wrap.className = "message ai";
    const label = document.createElement("div");
    label.className = "role-label";
    label.textContent = "Error";
    const bubble = document.createElement("div");
    bubble.className = "error-bubble";
    bubble.textContent = msg;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
  }

  function setStreaming(val) {
    isStreaming = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }

  // ── Main send logic ──
  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message || isStreaming) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    setStreaming(true);

    appendMessage("user", message);

    const typingEl = showTyping();

    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Request failed" }));
        typingEl.remove();
        showError(`Error ${res.status}: ${err.detail || "Something went wrong"}`);
        setStreaming(false);
        return;
      }

      // Replace typing indicator with real bubble
      typingEl.remove();
      const aiBubble = appendMessage("ai", "");
      aiBubble.classList.add("streaming");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (line.startsWith("event: done")) continue;

          if (line.startsWith("event: token_usage")) continue;

          if (line.startsWith("data: ")) {
            const token = line.slice(6);

            // Check for token usage line (sent as data after token_usage event)
            const num = parseInt(token, 10);
            if (!isNaN(num) && token.trim() === String(num)) {
              totalTokens += num;
              tokenEl.textContent = totalTokens.toLocaleString();
              continue;
            }

            if (token === "[DONE]") continue;

            fullText += token;
            aiBubble.textContent = fullText;
            scrollToBottom();
          }
        }
      }

      aiBubble.classList.remove("streaming");

      // Update history for multi-turn
      history.push({ role: "user", content: message });
      history.push({ role: "assistant", content: fullText });

    } catch (err) {
      typingEl?.remove();
      showError("Connection lost. Is the backend running at " + BACKEND + "?");
    }

    setStreaming(false);
    inputEl.focus();
  }
</script>
</body>
</html>
